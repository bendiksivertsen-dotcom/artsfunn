<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Source icon for pwa-assets-generator.
    Run: npm run generate:icons
    Generates: pwa-64x64.png, pwa-192x192.png, pwa-512x512.png,
               maskable-icon-512x512.png, apple-touch-icon-180x180.png
  -->

  <!-- Background (full bleed — maskable safe zone is inner 80 %) -->
  <rect width="512" height="512" fill="#2d7d46"/>

  <!-- Location pin centred in safe zone (approx 56–456 px from edges) -->
  <path
    d="M256 96
       C187 96 130 153 130 220
       C130 310 256 432 256 432
       C256 432 382 310 382 220
       C382 153 325 96 256 96 Z"
    fill="white"
  />

  <!-- Inner dot — darker green -->
  <circle cx="256" cy="217" r="56" fill="#1e5c32"/>

  <!-- Tiny white leaf inside dot to distinguish foreground -->
  <path
    d="M256 196
       Q232 208 232 228
       Q244 244 256 244
       Q268 244 280 228
       Q280 208 256 196 Z"
    fill="white"
    opacity="0.9"
  />
</svg>
